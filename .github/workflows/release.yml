name: Release

# Publish a GitHub Release with a single-file Windows build whenever a version
# tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish AirLink.Tray -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.ref_name }}
          publish/AirLinkTray.exe
          --title "AirLink Tray ${{ github.ref_name }}"
          --generate-notes
